<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Neo-brutalist OG card -->
  <rect width="1200" height="630" fill="#f3f3ee"/>

  <!-- structural grid -->
  <g stroke="rgba(12,12,11,0.05)" stroke-width="1">
    <path d="M0 90 H1200 M0 180 H1200 M0 270 H1200 M0 360 H1200 M0 450 H1200 M0 540 H1200"/>
    <path d="M120 0 V630 M240 0 V630 M360 0 V630 M480 0 V630 M600 0 V630 M720 0 V630 M840 0 V630 M960 0 V630 M1080 0 V630"/>
  </g>

  <!-- offset shadow + panel -->
  <rect x="54" y="56" width="1108" height="530" fill="#0c0c0b"/>
  <rect x="40" y="42" width="1108" height="530" fill="#ffffff" stroke="#0c0c0b" stroke-width="5"/>

  <!-- accent corner mark -->
  <rect x="1086" y="80" width="34" height="34" fill="#2323ff" stroke="#0c0c0b" stroke-width="3"/>

  <!-- top label -->
  <g font-family="'Space Mono', ui-monospace, Menlo, monospace" font-size="16" font-weight="700" fill="#0c0c0b" letter-spacing="2.6">
    <rect x="80" y="86" width="14" height="14" fill="#2323ff" stroke="#0c0c0b" stroke-width="2"/>
    <text x="104" y="99">YISHAI KAMINSKY — YISHAIK.COM</text>
  </g>

  <!-- headline -->
  <g font-family="Archivo, 'Arial Black', Arial, sans-serif" font-weight="900" fill="#0c0c0b" letter-spacing="-3">
    <text x="78" y="232" font-size="84">CUSTOMER SUCCESS,</text>
    <text x="78" y="318" font-size="84">IT MANAGEMENT &amp;</text>
  </g>

  <!-- accent highlight block for closing phrase -->
  <rect x="86" y="338" width="446" height="80" fill="#0c0c0b"/>
  <rect x="78" y="330" width="446" height="80" fill="#2323ff" stroke="#0c0c0b" stroke-width="4"/>
  <text x="100" y="392" font-family="Archivo, 'Arial Black', Arial, sans-serif" font-weight="900" font-size="76" letter-spacing="-3" fill="#f3f3ee">APPLIED AI</text>

  <!-- subline -->
  <text x="80" y="472" font-family="Archivo, Arial, sans-serif" font-size="27" font-weight="600" fill="#56564d" letter-spacing="-0.4">
    Built + operated end-to-end · 17+ years.
  </text>

  <!-- code chips + tagline -->
  <g font-family="'Space Mono', ui-monospace, Menlo, monospace" font-weight="700" font-size="18">
    <rect x="80"  y="512" width="56" height="44" fill="#2323ff" stroke="#0c0c0b" stroke-width="3"/>
    <text x="108" y="540" fill="#f3f3ee" text-anchor="middle">CS</text>
    <rect x="146" y="512" width="56" height="44" fill="#2323ff" stroke="#0c0c0b" stroke-width="3"/>
    <text x="174" y="540" fill="#f3f3ee" text-anchor="middle">IT</text>
    <rect x="212" y="512" width="56" height="44" fill="#2323ff" stroke="#0c0c0b" stroke-width="3"/>
    <text x="240" y="540" fill="#f3f3ee" text-anchor="middle">AI</text>
    <rect x="278" y="512" width="56" height="44" fill="#2323ff" stroke="#0c0c0b" stroke-width="3"/>
    <text x="306" y="540" fill="#f3f3ee" text-anchor="middle">··</text>
    <text x="356" y="540" fill="#0c0c0b" letter-spacing="1.4">ISRAEL · REMOTE-FRIENDLY · OPEN TO NEW ROLES</text>
  </g>
</svg>
